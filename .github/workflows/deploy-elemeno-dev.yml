name: Deploy elemeno-dev

on:
  push:
    branches:
      - main
    paths:
      - "elemeno-dev/**"
      - "scripts/sops-env.sh"
      - ".sops.yaml"
      - ".github/workflows/deploy-elemeno-dev.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: dev

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install ansible

      - name: Install Ansible dependencies
        run: |
          ansible-galaxy role install -r elemeno-dev/ansible/requirements.yml
          ansible-galaxy collection install -r elemeno-dev/ansible/requirements.yml

      - name: Connect runner to Tailscale
        uses: tailscale/github-action@v4
        with:
          oauth-client-id: ${{ secrets.TAILSCALE_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TAILSCALE_OAUTH_SECRET }}
          tags: tag:elemeno-ci
          args: --ssh

      - name: Verify SSH over Tailscale
        env:
          ELEMENO_DEV_HOST: ${{ vars.ELEMENO_DEV_HOST }}
        run: |
          ssh -o BatchMode=yes -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null alexey@"$ELEMENO_DEV_HOST" "hostname && docker --version"

      - name: Deploy with Ansible over Tailscale SSH
        env:
          ELEMENO_DEV_HOST: ${{ vars.ELEMENO_DEV_HOST }}
        run: |
          ANSIBLE_CONFIG=elemeno-dev/ansible/ansible.cfg \
          ansible-playbook \
            -i "elemeno_dev ansible_host=${ELEMENO_DEV_HOST} ansible_user=alexey," \
            elemeno-dev/ansible/playbooks/elemeno-dev.yml
